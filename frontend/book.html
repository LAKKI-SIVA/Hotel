<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book | Shiva Shankar Hotel</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html">Shiva Shankar Hotel</a>
    <button class="nav-toggle" aria-expanded="false" aria-label="Toggle navigation">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="menu.html">Menu</a>
      <a href="gallery.html">Gallery</a>
      <a href="book.html">Book</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main class="section narrow">
    <h1>Book a Room or Table</h1>
    <form id="bookingForm" class="form">
      <label>Name<input type="text" name="name" required></label>
      <label>Email<input type="email" name="email" required></label>
      <label>Phone<input type="tel" name="phone" required></label>
      <label>Booking Type
        <select name="bookingType" required>
          <option value="">Select</option>
          <option value="room">Room</option>
          <option value="table">Table</option>
        </select>
      </label>
      <label>Date<input type="date" name="date" required></label>
      <label>Guests<input type="number" name="guests" min="1" value="1" required></label>
      <label>Message<textarea name="message" rows="4"></textarea></label>
      <button class="button" type="submit">Submit Booking</button>
      <p id="bookingStatus" class="status" aria-live="polite"></p>
    </form>
  </main>

  <footer>
    <p>&copy; 2026 Shiva Shankar Hotel. All rights reserved.</p>
  </footer>
  <script src="./js/main.js"></script>
</body>
</html>
